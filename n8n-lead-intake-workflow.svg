  <g transform="translate(110 348)">
    <rect width="740" height="88" rx="18" fill="#0b1220" stroke="#2afc85" stroke-opacity="0.28"/>
    <text x="32" y="32" fill="#2afc85" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">RESPONSE</text>
    <text x="32" y="58" fill="#e6e9f0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Thank you, your request was received.</text>
    <text x="520" y="52" fill="#9aa6b8" font-family="Inter, Arial, sans-serif" font-size="13">CRM updated and activity logged</text>
  </g>
</svg>
